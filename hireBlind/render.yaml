services:
  - type: web
    name: hireblind-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OLLAMA_PII
        value: "false"
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: "production"
